name: Build & Release Signed Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read app version
        id: app_version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const buildGradle = fs.readFileSync("composeApp/build.gradle.kts", "utf8");
            const match = buildGradle.match(/^\s*versionName\s*=\s*"([^"]+)"/m);

            if (!match) {
              core.setFailed("Could not read versionName from composeApp/build.gradle.kts");
              return;
            }

            const versionName = match[1];
            core.setOutput("version_name", versionName);
            core.setOutput("release_tag", `v${versionName}`);

      - name: Ensure release version is new
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.app_version.outputs.release_tag }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const releaseTag = process.env.RELEASE_TAG;

            try {
              const latestRelease = await github.rest.repos.getLatestRelease({
                owner,
                repo
              });

              if (latestRelease.data.tag_name === releaseTag) {
                core.setFailed(`Latest release already uses ${releaseTag}. Update versionName in composeApp/build.gradle.kts before releasing.`);
                return;
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: releaseTag
              });

              core.setFailed(`Release ${releaseTag} already exists. Update versionName in composeApp/build.gradle.kts before releasing.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Restore keystore from base64
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mangly-release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/mangly-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          ./gradlew :composeApp:assembleRelease \
            -Pandroid.injected.signing.store.file="$ANDROID_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_ALIAS_PASSWORD" \
            -Pandroid.injected.signing.enabled=true

      - name: Find and rename generated release APK
        id: find_apk
        env:
          VERSION_NAME: ${{ steps.app_version.outputs.version_name }}
        run: |
          APK_PATH=$(find composeApp -type f -name "*-release.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "No release APK found" >&2
            exit 1
          fi

          DIR_NAME=$(dirname "$APK_PATH")
          NEW_APK_PATH="$DIR_NAME/Mangly-v${VERSION_NAME}.apk"

          mv "$APK_PATH" "$NEW_APK_PATH"

          echo "apk_path=$NEW_APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Get merged PR description
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commit_sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha
            });

            if (prs.data.length === 0) {
              core.setOutput("body", "Automated release.");
              return;
            }

            const pr = prs.data[0];
            core.setOutput("body", pr.body || "No PR description provided.");

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.release_tag }}
          name: Mangly ${{ steps.app_version.outputs.release_tag }}
          body: ${{ steps.pr.outputs.body }}
          draft: false
          prerelease: false
          files: ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
